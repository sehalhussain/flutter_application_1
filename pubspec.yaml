name: kitably
description: "A premium Islamic prayer and Quran app."
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State management
  provider: ^6.1.1
  # Local storage for progress and settings
  shared_preferences: ^2.2.2
  # Audio for Quran recitation
  just_audio: ^0.9.36
  audio_session: ^0.1.16
  # Networking
  http: ^1.1.0
  dio: ^5.3.3
  # Path for downloads
  path_provider: ^2.1.1
  permission_handler: ^11.0.1
  # HTML rendering for surah info
  flutter_widget_from_html: ^0.15.1
  flutter_markdown: ^0.7.7+1
  connectivity_plus: 6.0.5
  geolocator: ^14.0.1
  geocoding: ^4.0.0
  intl: ^0.20.2
  share_plus: ^12.0.2
  file_picker: ^11.0.2
  scrollable_positioned_list: ^0.3.8
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

flutter_native_splash:
  image: assets/icons/app_icon.png
  fullscreen: true
  color: "#ffffff"

flutter:
  uses-material-design: true

  assets:
    - assets/data/duas/
    - assets/data/names/asmaulhusna.json
    - assets/data/quran/
    - assets/icons/
    - assets/fonts/
    - assets/hadith/

  fonts:
    - family: QPC Hafs
      fonts:
        - asset: assets/fonts/UthmanicHafs_V22.ttf
    - family: IndoPak
      fonts:
        - asset: assets/fonts/DigitalKhattIndoPak.otf
    - family: Urdu
      fonts:
        - asset: assets/fonts/NotoNastaliqUrdu-VariableFont_wght.ttf
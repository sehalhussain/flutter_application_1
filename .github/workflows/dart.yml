name: iOS-ipa-build

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build
    # Using macos-14 is critical for accessing newer Xcode versions
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v3

      # This is the most important step to fix the 'isUltraConstrained' error
      - name: Set Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Removed architecture: x64 to allow native arm64 build on M1 runner

      - name: Install Dependencies
        run: |
          flutter pub get
          cd ios
          pod install --repo-update

      - name: Build iOS
        # Using --no-codesign as per your original workflow
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        working-directory: build/ios/iphoneos
        run: |
          mkdir Payload
          mv Runner.app/ Payload
          zip -qq -r -9 FlutterIpaExport.ipa Payload

      - name: Upload Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/ios/iphoneos/FlutterIpaExport.ipa
          tag: v1.0
          overwrite: true
          body: "This is a successful build using Xcode 15.4"

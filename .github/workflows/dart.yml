name: iOS-ipa-build

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-14  # Use macOS 14 for Apple Silicon speed
    steps:
      - uses: actions/checkout@v3

      - name: Select Xcode 16.0
        # This is the fix. Xcode 16.0 contains the SDK needed for isUltraConstrained.
        run: sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          flutter pub get
          cd ios
          pod repo update
          pod install

      - name: Build iOS
        # This will now succeed because the compiler understands connectivity_plus 7.x
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        working-directory: build/ios/iphoneos
        run: |
          mkdir Payload
          mv Runner.app/ Payload
          zip -qq -r -9 FlutterIpaExport.ipa Payload

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/ios/iphoneos/FlutterIpaExport.ipa
          tag: v1.0
          overwrite: true
          body: "Build fixed by targeting Xcode 16 SDK."

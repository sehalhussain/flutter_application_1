name: iOS-ipa-build

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build
    # Explicitly use macOS 14 (Sonoma) which supports newer Xcode versions
    runs-on: macos-14 
    steps:
      - uses: actions/checkout@v3

      - name: Select Xcode Version
        # Xcode 15.4 contains the iOS 17.5 SDK, which fixes the NWPath error
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # architecture: x64  <-- Note: macOS 14+ runners are ARM64 (M1/M2). 
          # You can usually remove the architecture line or change it to arm64.

      - run: flutter pub get

      - name: Install Pods
        run: |
          cd ios
          pod repo update
          pod install

      - run: flutter build ios --release --no-codesign

      - name: Create IPA Structure
        working-directory: build/ios/iphoneos
        run: |
          mkdir Payload
          mv Runner.app/ Payload
          zip -qq -r -9 FlutterIpaExport.ipa Payload

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/ios/iphoneos/FlutterIpaExport.ipa
          tag: v1.0
          overwrite: true
          body: "This is first release"
